name: build-binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            bin-name: repomap
          - os: macos-latest
            platform: darwin-arm64
            bin-name: repomap
          - os: windows-latest
            platform: windows-x64
            bin-name: repomap.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run test suite
        shell: bash
        run: |
          uv run --with pyinstaller,tree-sitter,tree-sitter-python,tree-sitter-javascript,tree-sitter-typescript,tree-sitter-go,tree-sitter-rust,tree-sitter-html,tree-sitter-css,tree-sitter-json \
            python -m unittest discover -s tests -v

      - name: Build binary
        shell: bash
        run: |
          uv run --with pyinstaller,tree-sitter,tree-sitter-python,tree-sitter-javascript,tree-sitter-typescript,tree-sitter-go,tree-sitter-rust,tree-sitter-html,tree-sitter-css,tree-sitter-json \
            python -m src.cli build-binary --output dist

      - name: Smoke test binary on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./dist/repomap doctor

      - name: Smoke test binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\repomap.exe doctor

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: repomap-${{ runner.os }}
          path: dist/repomap*

      - name: Package binary for npm
        shell: bash
        run: |
          PKG_DIR="mcp/repomap-bin/platforms/repomap-bin-${{ matrix.platform }}"
          mkdir -p "$PKG_DIR"
          cp dist/${{ matrix.bin-name }} "$PKG_DIR/"
          # Package version is read from mcp/repomap-bin/platforms/<pkg>/package.json
          echo "Packaged $PKG_DIR/${{ matrix.bin-name }}"

      - name: Configure npm auth
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish platform package to npm
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: bash
        working-directory: mcp/repomap-bin/platforms/repomap-bin-${{ matrix.platform }}
        run: |
          npm publish --access public

      - name: Publish MCP server to npm
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && matrix.platform == 'linux-x64'
        shell: bash
        working-directory: mcp
        run: |
          npm install
          npm run build
          npm publish --access public
