name: build-binaries

on:
   workflow_dispatch:
   push:
      branches:
         - main
         - master
      paths:
         - "src/**"
         - "pyproject.toml"
         - "npm/**"
         - ".github/workflows/build-binaries.yml"
         - "uv.lock"
   pull_request:
      paths:
         - "src/**"
         - "pyproject.toml"
         - "npm/**"
         - ".github/workflows/build-binaries.yml"
         - "uv.lock"

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

jobs:
   build:
      strategy:
         fail-fast: false
         matrix:
            include:
               - os: ubuntu-latest
                 platform: linux-x64
                 bin-name: repomap

      runs-on: ${{ matrix.os }}

      steps:
         - name: Checkout
           uses: actions/checkout@v6

         - name: Setup Python
           uses: actions/setup-python@v6
           with:
              python-version: "3.13"

         - name: Install uv
           uses: astral-sh/setup-uv@v5
           with:
              enable-cache: true

         - name: Install dependencies
           run: uv sync --all-extras --group dev

         - name: Run test suite
           shell: bash
           run: uv run pytest tests -v

         - name: Build binary
           shell: bash
           run: uv run python -m src.cli build-binary --output dist

         - name: Smoke test binary
           shell: bash
           run: |
              ./dist/repomap doctor --project .
              ./dist/repomap overview --project .
              ./dist/repomap verify --project . --quick || echo "verify --quick returned non-zero (expected in CI with no git changes)"

         - name: Verify binary version matches pyproject.toml
           shell: bash
           run: |
              EXPECTED=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
              ACTUAL=$(./dist/repomap --version | sed 's/repomap //')
              if [ "$EXPECTED" != "$ACTUAL" ]; then
                echo "ERROR: binary version mismatch!"
                echo "  pyproject.toml: $EXPECTED"
                echo "  binary --version: $ACTUAL"
                echo "  The binary was built without version embedding. Check build.py."
                exit 1
              fi
              echo "OK: binary version $ACTUAL matches pyproject.toml"

         - name: Upload binary artifact
           uses: actions/upload-artifact@v7
           with:
              name: repomap-${{ runner.os }}
              path: dist/repomap*

         - name: Copy binary to npm platform package
           shell: bash
           run: |
              cp dist/${{ matrix.bin-name }} npm/platforms/${{ matrix.platform }}/${{ matrix.bin-name }}

         - name: Sync npm version from pyproject.toml
           shell: bash
           run: |
              VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
              cd npm/platforms/${{ matrix.platform }}
              node -e "const p=require('./package.json');p.version='$VERSION';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

         - name: Publish platform package to npm
           if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
           shell: bash
           run: |
              cd npm/platforms/${{ matrix.platform }}
              npm set "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              PACKAGE_NAME=$(node -e "console.log(require('./package.json').name)")
              PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
              if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
                echo "npm publish skipped: $PACKAGE_NAME@$PACKAGE_VERSION already exists"
              else
                npm publish --access public
              fi

         - name: Sync and publish wrapper package (linux only)
           if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && matrix.platform == 'linux-x64'
           shell: bash
           run: |
              VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
              cd npm/wrapper
              node -e "const p=require('./package.json');p.version='$VERSION';const deps=p.optionalDependencies||{};for(const k of Object.keys(deps))deps[k]='$VERSION';p.optionalDependencies=deps;require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
              npm set "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
              PACKAGE_NAME=$(node -e "console.log(require('./package.json').name)")
              PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
              if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
                echo "npm publish skipped: $PACKAGE_NAME@$PACKAGE_VERSION already exists"
              else
                npm publish
              fi
