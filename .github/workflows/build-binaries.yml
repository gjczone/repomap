name: build-binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "skills/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "skills/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            bin-name: repomap
          - os: macos-latest
            platform: darwin-arm64
            bin-name: repomap
          - os: windows-latest
            platform: windows-x64
            bin-name: repomap.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run test suite
        shell: bash
        run: |
          uv run --with pytest,pyinstaller,tree-sitter,tree-sitter-python,tree-sitter-javascript,tree-sitter-typescript,tree-sitter-go,tree-sitter-rust,tree-sitter-html,tree-sitter-css,tree-sitter-json \
            pytest tests -v

      - name: Build binary
        shell: bash
        run: |
          uv run --with pyinstaller,tree-sitter,tree-sitter-python,tree-sitter-javascript,tree-sitter-typescript,tree-sitter-go,tree-sitter-rust,tree-sitter-html,tree-sitter-css,tree-sitter-json \
            python -m src.cli build-binary --output dist

      - name: Smoke test binary on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./dist/repomap doctor

      - name: Smoke test binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\repomap.exe doctor

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: repomap-${{ runner.os }}
          path: dist/repomap*
